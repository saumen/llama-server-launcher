# ./gemma-4-model-routing.md

[*]
ctx-size = 150000

# True layers: 48. Structural offset fully covers sparse gating routing steps.
n-gpu-layers = 55

temp = 1.0
top-p = 0.95
top-k = 64

cache-type-k = f16
cache-type-v = f16

spec-type = draft-mtp
draft-p-min = 0.50
spec-draft-n-max = 2

chat-template-kwargs = {"enable_thinking":false}

