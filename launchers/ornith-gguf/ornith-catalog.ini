# Set model specific settings in the presets.
# Set server level settings in the `../launcher-ornith.sh`
########################################################################################################################

[*]
# Base defaults — model-specific overrides below each preset block

ctx-size = 262144
# 262K native context window (HF README: --max-model-len 262144 in vLLM recipe)

cache-type-k = f16
cache-type-v = f16
# Default kv cache precision — no Ornith-specific guidance found

temperature = 0.6
# HF official quickstart: temperature=0.6, top_p=0.95, top_k=20 for general use.
# Benchmarks use 1.0 but that is for reproduction only (see blog footnote).

top-p = 0.95
# HF official quickstart. Benchmarks vary: 1.0 for Terminal-Bench, 0.95 for SWE-Bench.

top-k = 20
# HF official quickstart.

min-p = 0.0
# Default — no Ornith-specific guidance found.

repeat-penalty = 1.0
# Default — no Ornith-specific guidance found.

# Ornith uses qwen3 reasoning parser (vLLM: --reasoning-parser qwen3).
# No MTP drafter files in HF repo — only weight GGUFs, no MTP/ directory.
spec-type = none

########################################################################################################################
# General - Non-thinking (fast/low-latency)
########################################################################################################################

[deepreinforce-ai/Ornith-1.0-35B-GGUF-NT]
# https://huggingface.co/deepreinforce-ai/Ornith-1.0-35B-GGUF

model = /home/saumen/.cache/huggingface/hub/deepreinforce-ai/Ornith-1.0-35B-GGUF/ornith-1.0-35b-Q5_K_M.gguf
alias = Ornith-1.0-35B-Q5-IT, ornith-flash

ctx-size = 80000
# 80K context — non-thinking preset uses reduced context (matches Qwen3.6-35B-A3B-IT pattern).

reasoning = on
# Reasoning stays on for tool-calling capability — model needs it for agentic behavior.
# Unlike Qwen where reasoning=off for non-thinking, Ornith's reasoning is tied to tool-use.

chat-template-kwargs = {"enable_thinking":false}
# Disable CoT block via chat template only (not reasoning=off). Matches Qwen enable_thinking:false pattern.
# Model still reasons internally but skips the <think> block output — lower latency for simple tasks.

temperature = 0.7
# Higher temp for faster, more exploratory responses (no CoT constraint).

top-p = 0.80
# Tighter top-p for faster convergence without thinking trace.

presence-penalty = 1.5
# Same as general preset — reduce repetition in exploratory mode.

########################################################################################################################
# General - Thinking
########################################################################################################################

[deepreinforce-ai/Ornith-1.0-35B-GGUF]
# https://huggingface.co/deepreinforce-ai/Ornith-1.0-35B-GGUF

model = /home/saumen/.cache/huggingface/hub/deepreinforce-ai/Ornith-1.0-35B-GGUF/ornith-1.0-35b-Q5_K_M.gguf
alias = Ornith-1.0-35B-Q5-general, ornith-general

ctx-size = 120000
# Match existing Qwen3.6-35B-A3B preset pattern (262K native → 120K preset).

reasoning = on
# HF README: "Ornith-1.0-35B is a reasoning model: by default the assistant turn opens with a <think> block."

chat-template-kwargs = {"enable_thinking":true}
# Ornith uses qwen3 reasoning parser — matches vLLM --reasoning-parser qwen3 in official recipe.

presence-penalty = 1.5
# Inherited from existing qwen3.6-catalog.ini convention (general/expert presets use 1.5).
# NOT mentioned in any Ornith docs — apply for exploratory/general tasks to reduce repetition.

########################################################################################################################
# Coder
########################################################################################################################

[deepreinforce-ai/Ornith-1.0-35B-GGUF-coder]
# https://huggingface.co/deepreinforce-ai/Ornith-1.0-35B-GGUF

model = /home/saumen/.cache/huggingface/hub/deepreinforce-ai/Ornith-1.0-35B-GGUF/ornith-1.0-35b-Q5_K_M.gguf
alias = Ornith-1.0-35B-Q5-coder, ornith-coder

ctx-size = 120000
# Same as general — 120K preset for consistency.

reasoning = on
# Ornith is a reasoning model — thinking blocks expected for agentic tool-calling.

chat-template-kwargs = {"enable_thinking":true}
# Same as general — qwen3-style thinking template.

presence-penalty = 0.0
# Inherited from existing qwen3.6-catalog.ini convention (coder presets use 0.0).
# NOT mentioned in any Ornith docs — set to 0.0 for code-heavy tasks where tool-call repetition is expected.
