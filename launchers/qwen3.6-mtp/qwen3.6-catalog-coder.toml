# Set model specific settings in the presets.
# Set server level settings in the `launcher.sh`
########################################################################################################################

[*]
ctx-size = 150000

cache-type-k = f16
cache-type-v = f16

# Thinking mode for precise coding tasks
reasoning = on
temperature = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.0

# Speculation
spec-type = draft-mtp
spec-draft-n-max = 3
draft-p-min = 0.50

