# Set model specific settings in the presets.
# Set server level settings in the `launcher-qwen.sh`
########################################################################################################################

[*]
ctx-size = 150000
n-gpu-layers = 99

cache-type-k = f16
cache-type-v = f16

# Non-thinking, general tasks
chat-template-kwargs = {"enable_thinking":false}
temperature = 0.7
top-p = 0.8
top-k = 20
min-p = 0.0
presence-penalty = 1.5
repeat-penalty = 1.0

# Speculation
spec-type = draft-mtp
spec-draft-n-max = 3
draft-p-min = 0.50

