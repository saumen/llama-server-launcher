################################################################################
# Set model specific settings in the presets.
# Set server level settings in the `launcher.sh`
################################################################################

[*]
cache-type-k = f16
cache-type-v = f16

spec-type = draft-mtp

[unsloth/Qwen3.6-27B-MTP]
model = /home/saumen/.cache/huggingface/hub/unsloth/Qwen3.6-27B-MTP-GGUF/Qwen3.6-27B-UD-Q5_K_XL.gguf
alias = Qwen3.6-27B
ctx-size = 70000

# True layers: 64. Offset allocated cleanly to cover attention-heads + MTP components.
n-gpu-layers = 70

spec-draft-n-max = 2
draft-p-min = 0.50

temp = 0.3
top-p = 0.9
top-k = 20

################################################################################

[unsloth/qwen3.6-35B-A3B-MTP]
model = /home/saumen/.cache/huggingface/hub/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf
alias = Qwen3.6-35B-A3B
ctx-size = 150000

# True layers: 40. Buffers the routing matrices alongside sequential MTP predictors.
n-gpu-layers = 50

spec-draft-n-max = 3
draft-p-min = 0.50

temp = 0.6
top-p = 0.95

################################################################################

[unsloth/qwen3.6-35B-A3B-MTP-NT]
model = /home/saumen/.cache/huggingface/hub/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf
alias = Qwen3.6-35B-A3B-Flash
ctx-size = 150000

# True layers: 40. Buffers the routing matrices alongside sequential MTP predictors.
n-gpu-layers = 50

spec-draft-n-max = 3
draft-p-min = 0.50

temperature = 0.7
top-p = 0.8
top-k = 20
min-p = 0.0
presence-penalty = 1.5
repeat-penalty = 1.0

chat-template-kwargs = {"enable_thinking":false}
